"$schema" = 'https://starship.rs/config-schema.json'

# include = '/usr/share/foot/themes/cyberpunk-neon'

# Inserts a blank line between shell prompts
add_newline = true

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

# position custom commands individuall with "${custom.your_cmd}" brackets are necessary
# format = '$custom$time$all${custom.git_ghost}${custom.git_wip}$character'
# right_format = "${custom.is_private_label_right}"

# palette = "catppuccin_macchiato"

# Replace the 'ÔØ»' symbol in the prompt with 'ÔŞ£'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[ÔŞ£](bold #00ff00)' # The 'success_symbol' segment is being set to 'ÔŞ£' with the color 'bold green'
error_symbol = "[ÔŞ£](bold #ff0000)"
#error_symbol = "[Ô£û](bold #ff0000)"
vicmd_symbol = "[¯şà](bold #ffff00)"

# Duration entry
[cmd_duration]
min_time = 10000
format = "[¾░öş $duration](bold cyan)"

[git_status]
ahead = '[´üó $count](bold green) '
conflicted = '[¾▒íé ](bold red) '
untracked = '[´ä¿ $count](bold purple) '
staged = '[´üğ $count](bold green) '
stashed = '[¯¼® $count](cyan) '
deleted = '[´ü¿ $count](bold red) '
modified = '[¯®│ $count](bold yellow) '
behind = '[´üú $count](bold yellow) '
renamed = '[¾░¼┤ $count](bold blue) '
up_to_date = '[´Çî ](bold green) '
diverged = '[´ü¬ $ahead_count ´üú $behind_count ](bold red) '
format = '([$all_status$ahead_behind]($style))'

# Git entry
[git_metrics]
disabled = false
added_style = "green"
deleted_style = "red"
format = '(\([+$added]($added_style)/[-$deleted]($deleted_style)\)) '

[git_branch]
symbol = "´Éİ "

[hg_branch]
symbol = "´Éİ "

[fossil_branch]
symbol = "´Éİ "

# Gcloud entry
[gcloud]
format = "on [$symbol$domain]($style) "
symbol = "Ôİü´©Å "
style = "bold blue"

# Directory entry
[directory]
read_only = " ¾░î¥ "
home_symbol = "´Çò "
truncation_length = 3

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "
"Repos" = "´Éü "
"Videos" = "´Ç¢ "
"obsidianVault" = "¾░Å¬ ¾░á« "
".config" = "´Çô "

[custom.is_fish]
description = "Indicates when in FISH shell"
when = 'test "$STARSHIP_SHELL" = "fish"'
shell = ["bash", "--norc"]
command = 'echo "­şæ¢"'
format = '[ $output ](black) '

[custom.is_bash]
description = "Indicates when in BASH shell"
command = "echo '¯»è'"
shell = ["bash", "--norc"]                   # for fastest performance
when = 'test "$STARSHIP_SHELL" = "bash"'
format = '[ $output ](bg:white black) '

[custom.is_private_label_right]
description = "Indicates when in ZSH is running without $HISTFILE"
command = 'echo "¾░ù╣ PRIVATE"'
when = '[ -n "$NOHISTFILE" ] && [ "$STARSHIP_SHELL" == "zsh" ]'
# shell = ["sh", "--norc"]                                           # for fastest performance
format = '[ $output ](bg:purple black) '

[custom.is_private_icon]
description = "Indicates when in ZSH is running without $HISTFILE"
command = 'echo "¾░ù╣"'
when = '[ -n "$NOHISTFILE" ] && [ "$STARSHIP_SHELL" == "zsh" ]'
# shell = ["sh", "--norc"]                                           # for fastest performance
format = '[ $output ](bg:purple black) '

[custom.git_ghost]
description = "Indicates when a Git Repo contains in ZSH is running without $HISTFILE"
command = 'echo "¾▒ÖØ"'
when = '[ -d .git ] && git ghosted >& /dev/null'
# shell = ["sh", "--norc"]                                                               # for fastest performance
format = '[ $output ](blue bold) '

[custom.git_wip]
description = "Indicates when a Git Repo contains latest commit is WIP"
command = 'echo "WIP ´ü▒ "'
when = '[ -d .git ] && git log -1 --pretty=%B | rg --line-regexp "WIP" >& /dev/null'
# shell = ["sh", "--norc"]                                                             # for fastest performance
format = '[ $output ](yellow bold) '

# Custom entries
[custom.yazi]
description = "Shell launched inside Yazi"
symbol = "´äò "
style = "blue bold"
when = """ test -n "$YAZI_LEVEL" """

[custom.neovim]
command = 'bob ls | rg Used | awk "{print \$2}"' # shows output of command
detect_folders = ["lua"]
style = "#ff00ff"
format = "[¯İ½ $output ]($style)"
shell = ["bash"]

[custom.hypr]
style = "blue"
format = "[´ıÖ ]($style)"
detect_files = ["hyprland.conf"]

[custom.ebuild]
format = "via $symbol [$output]($style) "
symbol = "­şôĞ"
detect_extensions = ["ebuild"]
style = "bold #FF8700"
command = "ebuild --version"

[custom.cpp]
format = "via [$symbol]($style)[clang++ v$output]($style) "
symbol = "¯İØ  "
detect_extensions = ["cpp", "hpp"]
style = "bold #417AB1"
command = "clang++ --version | head -1 | awk '{ print $3 }'"

[custom.c]
format = "via [$symbol]($style)[clang v$output]($style) "
symbol = "¯İŞ  "
detect_extensions = ["c", "h"]
style = "bold #6876C5"
command = "clang --version | head -1 | awk '{ print $3 }'"

